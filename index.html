<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytes YouTube Mixer</title>
    <style>
        :root {
            --yt-red: #FF0000;
            --yt-black: #0f0f0f;
            --yt-white: #ffffff;
            --yt-grey: #272727;
            --accent-green: #19510A;
        }

        body {
            background-color: var(--yt-black);
            color: var(--yt-white);
            font-family: "Roboto", Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 15px 5%;
            background: var(--yt-black);
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--yt-grey);
            box-sizing: border-box;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            width: 95%;
            max-width: 1400px;
            margin-top: 20px;
        }

        /* Reproductor de YouTube */
        .video-player-container {
            background: #000;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--yt-grey);
        }

        /* Panel de Control Lateral */
        .control-panel {
            background: var(--yt-grey);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .timer-box {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--accent-green);
        }

        .timer-label { font-size: 12px; color: #aaa; text-transform: uppercase; }
        .timer-value { font-size: 32px; font-weight: bold; color: var(--accent-green); }

        .input-group label { font-size: 14px; display: block; margin-bottom: 5px; color: #efefef; }
        input, textarea {
            width: 100%;
            background: #121212;
            border: 1px solid #3f3f3f;
            color: white;
            padding: 12px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            background: var(--yt-red);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { filter: brightness(0.9); }
        .btn-active { background: var(--accent-green) !important; }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 20px; font-weight: bold; color: white;">
        <span style="background: var(--yt-red); padding: 2px 6px; border-radius: 4px; margin-right: 5px;">Bytes</span> Mixer
    </div>
</div>

<div class="main-container">
    <div class="video-player-container">
        <div id="player"></div>
    </div>

    <div class="control-panel">
        <div class="timer-box">
            <div class="timer-label">Próximo anuncio en:</div>
            <div class="timer-value" id="countdown">01:00</div>
        </div>

        <div class="input-group">
            <label>1. Buscar Música (Género o Artista)</label>
            <input type="text" id="genre-input" placeholder="Ej: Lofi Hip Hop">
            <button style="width: 100%; margin-top: 8px;" onclick="loadNewRadio()">Cambiar Música</button>
        </div>

        <div class="input-group">
            <label>2. Texto del Locutor</label>
            <textarea id="tts-content" rows="4" placeholder="Lo que dirá la voz cada minuto..."></textarea>
        </div>

        <button id="master-btn" onclick="toggleSystem()" style="width: 100%;">INICIAR SISTEMA</button>
        
        <div id="status" style="font-size: 12px; color: #888; text-align: center; margin-top: 10px;">
            Esperando acción...
        </div>
    </div>
</div>

<script>
    let player;
    let mainInterval;
    let countdownInterval;
    let isRunning = false;
    let timeLeft = 60;

    // Cargar YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            playerVars: { 'autoplay': 0, 'controls': 1 },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function loadNewRadio() {
        const query = document.getElementById('genre-input').value;
        if (!query) return alert("Escribe un género o canción");
        
        player.loadPlaylist({
            listType: 'search',
            list: query,
            index: 0,
            suggestedQuality: 'large'
        });
        document.getElementById('status').innerText = "Cargando selección...";
    }

    function toggleSystem() {
        if (!isRunning) {
            startSystem();
        } else {
            stopSystem();
        }
    }

    function startSystem() {
        isRunning = true;
        timeLeft = 60;
        document.getElementById('master-btn').innerText = "DETENER SISTEMA";
        document.getElementById('master-btn').classList.add('btn-active');
        
        // Iniciar cuenta regresiva visual
        startCountdown();
        
        // Programar la voz cada minuto
        mainInterval = setInterval(runLocutor, 60000);
        document.getElementById('status').innerText = "Sistema en vivo";
    }

    function startCountdown() {
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft < 0) timeLeft = 59;
            
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('countdown').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    }

    function runLocutor() {
        const text = document.getElementById('tts-content').value;
        if (!text) return;

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'es-MX';
        
        // Ducking: Bajar volumen
        player.setVolume(20);
        document.getElementById('status').innerText = "Locutor hablando...";

        msg.onend = () => {
            player.setVolume(100);
            document.getElementById('status').innerText = "Música sonando...";
            timeLeft = 60; // Reiniciar cuenta regresiva visual
        };

        window.speechSynthesis.speak(msg);
    }

    function stopSystem() {
        isRunning = false;
        clearInterval(mainInterval);
        clearInterval(countdownInterval);
        window.speechSynthesis.cancel();
        
        document.getElementById('master-btn').innerText = "INICIAR SISTEMA";
        document.getElementById('master-btn').classList.remove('btn-active');
        document.getElementById('status').innerText = "Sistema detenido";
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            document.getElementById('status').innerText = "Reproduciendo...";
        }
    }
</script>

</body>
</html>
