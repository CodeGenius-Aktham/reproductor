<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Music Pro - Final</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --nav: #0f0f0f;
            --text: #ffffff;
            --accent: #ff0000;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--nav);
            padding: 15px;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .search-bar {
            display: flex;
            width: 100%;
            max-width: 600px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 40px 0 0 40px;
            border: 1px solid #333;
            background: #121212;
            color: white;
            outline: none;
        }

        .search-bar button {
            padding: 0 20px;
            border-radius: 0 40px 40px 0;
            border: 1px solid #333;
            background: #222;
            color: white;
            cursor: pointer;
        }

        .content {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .video-info { margin-top: 15px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        
        .error-fix-msg {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            background: #222;
            padding: 10px;
            border-radius: 8px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .video-item { cursor: pointer; transition: 0.3s; }
        .video-item:hover { transform: translateY(-5px); }
        .video-item img { width: 100%; border-radius: 10px; }
        .video-item h3 { font-size: 14px; margin: 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar artista o canción...">
        <button id="searchBtn">🔍</button>
    </div>
</header>

<div class="content">
    <div id="playerSection" style="display: none;">
        <div class="video-container" id="player"></div>
        <div class="video-info">
            <h1 id="title" style="font-size: 1.5em; margin: 0;"></h1>
            <p id="channel" style="color: #aaa;"></p>
            <div class="error-fix-msg" id="fixMsg">
                ¿Ves un error? Algunos videos oficiales no permiten reproducción externa. 
                <a id="externalLink" target="_blank">Haz clic aquí para verlo directo en YouTube</a>.
            </div>
        </div>
    </div>

    <h2 id="statusTitle">Buscando éxitos...</h2>
    <div class="video-grid" id="grid"></div>
</div>

<script>
    const API_KEY = 'AIzaSyA9bs1dq8qQPoUn30BzAJlsul-A_Cs32C4';

    async function search(query) {
        document.getElementById('statusTitle').innerText = `Resultados para: ${query}`;
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            render(data.items);
        } catch (e) {
            console.error(e);
        }
    }

    function render(items) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'video-item';
            div.onclick = () => play(item.id.videoId, item.snippet.title, item.snippet.channelTitle);
            div.innerHTML = `
                <img src="${item.snippet.thumbnails.medium.url}">
                <h3>${item.snippet.title}</h3>
                <p style="font-size:12px; color:#aaa;">${item.snippet.channelTitle}</p>
            `;
            grid.appendChild(div);
        });
    }

    function play(id, title, channel) {
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('title').innerText = title;
        document.getElementById('channel').innerText = channel;
        document.getElementById('externalLink').href = `https://www.youtube.com/watch?v=${id}`;
        
        // El "Origin" es clave para que YouTube no bloquee la conexión
        const origin = window.location.origin === "null" ? "http://localhost" : window.location.origin;

        // Versión de URL con parámetros de compatibilidad máxima
        const embedUrl = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&origin=${origin}&rel=0&showinfo=0&enablejsapi=1`;
        
        document.getElementById('player').innerHTML = `
            <iframe 
                src="${embedUrl}" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>`;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('searchBtn').onclick = () => search(document.getElementById('searchInput').value);
    document.getElementById('searchInput').onkeypress = (e) => { if(e.key === 'Enter') search(e.target.value); };

    // Carga inicial
    window.onload = () => search('Daddy Yankee 2026');
</script>
</body>
</html>
