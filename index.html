<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytes Auto-Station</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #19510A;
            --yt-red: #ff0000;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .station-container {
            width: 90%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .player-header { text-align: center; margin-bottom: 20px; }
        .player-header h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        
        /* Contenedor del video (Visible para algoritmo) */
        #video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .input-group { margin-bottom: 15px; }
        label { font-size: 11px; text-transform: uppercase; color: #888; letter-spacing: 1px; }

        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            margin-top: 5px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        
        button {
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start { background: var(--yt-red); color: white; }
        .btn-stop { background: #333; color: #eee; display: none; }

        .status-bar {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .timer { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 16px; }
    </style>
</head>
<body>

<div class="station-container">
    <div class="player-header">
        <h1>BYTES <span style="color: var(--yt-red)">RADIO</span></h1>
    </div>

    <div id="video-container">
        <div id="player"></div>
    </div>

    <div class="input-group">
        <label>1. Canción Semilla (ID o Nombre)</label>
        <input type="text" id="seed-track" placeholder="Ej: dQw4w9WgXcQ o 'Solar Sailer Daft Punk'">
    </div>

    <div class="input-group">
        <label>2. Guion del Locutor</label>
        <textarea id="tts-text" rows="3" placeholder="Tu anuncio aquí..."></textarea>
    </div>

    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initRadio()">ENCENDER ESTACIÓN</button>
        <button id="stop-btn" class="btn-stop" onclick="stopRadio()">APAGAR</button>
    </div>

    <div class="status-bar">
        <span id="status-text">ESPERANDO SEÑAL...</span>
        <span class="timer" id="timer">01:00</span>
    </div>
</div>

<script>
    let player;
    let ttsInterval;
    let timerInterval;
    let timeLeft = 60;

    // API de YouTube
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            playerVars: { 
                'autoplay': 1, 
                'controls': 1,
                'rel': 1,      // Habilita videos relacionados
                'enablejsapi': 1 
            },
            events: {
                'onReady': () => console.log("Player listo"),
                'onStateChange': handlePlayerState
            }
        });
    }

    function initRadio() {
        const seed = document.getElementById('seed-track').value;
        if (!seed) return alert("Ingresa una canción para empezar.");

        // Nuclear Style: Cargar búsqueda y activar sugerencias automáticas
        player.loadPlaylist({
            listType: 'search',
            list: seed
        });

        startCycles();
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'block';
    }

    function handlePlayerState(event) {
        // Cuando el video termina, el algoritmo de YouTube carga el siguiente automáticamente
        // si el usuario ha interactuado. Si se detiene, lo forzamos.
        if (event.data === YT.PlayerState.ENDED) {
            player.playVideo(); 
        }
    }

    function startCycles() {
        clearInterval(ttsInterval);
        clearInterval(timerInterval);
        timeLeft = 60;

        // Ciclo de locutor
        ttsInterval = setInterval(speak, 60000);

        // Ciclo visual de reloj
        timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft < 0) timeLeft = 59;
            
            const s = timeLeft < 10 ? '0' + timeLeft : timeLeft;
            document.getElementById('timer').innerText = `00:${s}`;
        }, 1000);

        document.getElementById('status-text').innerText = "EN EL AIRE";
    }

    function speak() {
        const text = document.getElementById('tts-text').value;
        if (!text) return;

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-MX';

        // Ducking (Efecto Nuclear/Radio)
        player.setVolume(15);
        document.getElementById('status-text').innerText = "LOCUTOR AL AIRE";

        utterance.onend = () => {
            player.setVolume(100);
            document.getElementById('status-text').innerText = "EN EL AIRE";
        };

        window.speechSynthesis.speak(utterance);
    }

    function stopRadio() {
        clearInterval(ttsInterval);
        clearInterval(timerInterval);
        player.stopVideo();
        window.speechSynthesis.cancel();
        
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('status-text').innerText = "ESTACIÓN APAGADA";
        document.getElementById('timer').innerText = "01:00";
    }
</script>

</body>
</html>
