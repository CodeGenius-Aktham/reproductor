<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytes Radio - Force Engine</title>
    <style>
        :root { --bg: #0a0a0b; --yt: #FF0000; --bytes: #19510A; --card: #161617; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 110px; }
        
        .nav { position: sticky; top: 0; background: rgba(10,10,11,0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid #222; z-index: 100; text-align: center; }
        .search-wrap { display: flex; max-width: 500px; margin: 0 auto; border: 1px solid #333; border-radius: 40px; overflow: hidden; background: #000; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 20px; outline: none; }
        .search-btn { background: #222; border: none; color: white; padding: 0 20px; cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .card:hover { border-color: var(--bytes); transform: translateY(-3px); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-body { padding: 12px; }
        .card-body h4 { margin: 0; font-size: 14px; color: #efefef; }

        .player-bar { position: fixed; bottom: 0; width: 100%; background: #111; border-top: 2px solid var(--bytes); padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; }
        .tts-area { width: 45%; }
        textarea { width: 100%; background: #000; border: 1px solid #333; color: #888; border-radius: 8px; padding: 8px; font-size: 11px; resize: none; outline: none; }
        .timer { font-size: 24px; font-weight: 800; color: var(--bytes); font-family: monospace; }
        button#master { background: var(--yt); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        #yt-hidden { position: absolute; left: -9999px; }
    </style>
</head>
<body>

<div class="nav">
    <div class="search-wrap">
        <input type="text" id="q" placeholder="Buscar música (Ej: Solomun Mix)">
        <button class="search-btn" onclick="forceSearch()">BUSCAR</button>
    </div>
</div>

<div class="grid" id="grid">
    <p style="text-align: center; grid-column: 1/-1; color: #444; margin-top: 40px;">Escribe algo y presiona Buscar para activar los motores de YouTube.</p>
</div>

<div class="player-bar">
    <div id="yt-hidden"></div>
    <div class="tts-area">
        <label style="font-size: 9px; color: var(--bytes); font-weight: bold; display: block; margin-bottom: 4px;">LOCUTOR ACTIVO</label>
        <textarea id="msg" rows="2">Estás en sintonía de la radio inteligente de Abel Ghanam. Disfruta de la mejor música sin límites.</textarea>
    </div>
    <div class="timer" id="clock">01:00</div>
    <button id="master" onclick="control()">ENCENDER</button>
</div>

<script>
    let p, running = false, t1, t2, sec = 60;

    // Iniciar API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        p = new YT.Player('yt-hidden', {
            height: '0', width: '0',
            playerVars: { 'autoplay': 0 },
            events: { 'onStateChange': (e) => { if(e.data === 0) p.playVideo(); } }
        });
    }

    // El truco "Force Search": Usamos un proxy de sugerencias para obtener IDs reales
    async function forceSearch() {
        const query = document.getElementById('q').value;
        if(!query) return;
        
        const grid = document.getElementById('grid');
        grid.innerHTML = "<p style='text-align:center; grid-column:1/-1;'>Conectando con YouTube...</p>";

        // Usamos el endpoint de Google Suggest que suele ser más abierto
        const script = document.createElement('script');
        script.src = `https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(query)}&callback=handleSuggest`;
        document.body.appendChild(script);
        
        // Mientras tanto, pedimos al reproductor que cargue una búsqueda para extraer datos
        p.cuePlaylist({ listType: 'search', list: query });
        
        setTimeout(() => {
            const list = p.getPlaylist();
            if(!list) {
                grid.innerHTML = "<p style='text-align:center; grid-column:1/-1; color:red;'>YouTube bloqueó la búsqueda rápida. <br>Prueba buscando el nombre exacto de la canción.</p>";
                return;
            }
            grid.innerHTML = "";
            list.slice(0, 10).forEach((id, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => { p.loadVideoById(id); if(!running) control(); };
                card.innerHTML = `
                    <img src="https://i.ytimg.com/vi/${id}/mqdefault.jpg">
                    <div class="card-body">
                        <h4>Opción Sugerida #${i+1}</h4>
                        <p style="font-size:11px; color:var(--bytes); margin-top:5px;">Click para iniciar radio</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }, 1500);
    }

    function handleSuggest(data) {
        console.log("Sugerencias listas:", data[1]);
    }

    function control() {
        running = !running;
        const b = document.getElementById('master');
        if(running) {
            b.innerText = "DETENER"; b.style.background = "#222";
            sec = 60;
            t1 = setInterval(() => {
                sec--; if(sec < 0) sec = 59;
                document.getElementById('clock').innerText = `00:${sec < 10 ? '0'+sec : sec}`;
            }, 1000);
            t2 = setInterval(talk, 60000);
        } else {
            b.innerText = "ENCENDER"; b.style.background = "#FF0000";
            clearInterval(t1); clearInterval(t2); p.stopVideo(); window.speechSynthesis.cancel();
        }
    }

    function talk() {
        const m = new SpeechSynthesisUtterance(document.getElementById('msg').value);
        m.lang = 'es-MX';
        p.setVolume(15);
        m.onend = () => { p.setVolume(100); sec = 60; };
        window.speechSynthesis.speak(m);
    }
</script>

</body>
</html>
