<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytes Audio Mixer</title>
    <style>
        :root {
            --bg-color: #101820;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --accent: #19510A;
            --text: #D7D7D6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .mixer-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { text-align: center; font-weight: 300; letter-spacing: 1px; }

        .section {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
        }

        input, textarea, button {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            background: var(--accent);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:active { transform: scale(0.95); }

        #youtube-player {
            width: 100%;
            height: 0; /* Oculto pero funcional */
            overflow: hidden;
        }

        .status {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="mixer-container">
    <h2>Audio Mixer Control</h2>

    <div class="section">
        <label>1. Música de Fondo (YouTube ID)</label>
        <input type="text" id="yt-id" placeholder="ID del video (ej: dQw4w9WgXcQ)">
        <button onclick="loadVideo()">Cargar Música</button>
        <div id="youtube-player"></div>
    </div>

    <div class="section">
        <label>2. Voces Pregrabadas (.mp3)</label>
        <input type="file" id="voice-upload" accept="audio/*" multiple>
        <div id="voice-list"></div>
    </div>

    <div class="section">
        <label>3. Anuncio Automático (Cada 1 min)</label>
        <textarea id="tts-text" rows="3" placeholder="Escribe lo que la IA dirá cada minuto..."></textarea>
        <button id="btn-auto" onclick="toggleAutoMode()">Activar Ciclo Automático</button>
    </div>

    <div class="status" id="status-bar">Sistema listo.</div>
</div>

<script>
    let player;
    let autoInterval;
    let isAutoOn = false;

    // 1. Cargar API de YouTube
    function onYouTubeIframeAPIReady() {
        console.log("YouTube API Ready");
    }

    function loadVideo() {
        const videoId = document.getElementById('yt-id').value;
        if (player) player.destroy();
        
        player = new YT.Player('youtube-player', {
            height: '0',
            width: '0',
            videoId: videoId,
            events: {
                'onReady': (event) => {
                    event.target.playVideo();
                    document.getElementById('status-bar').innerText = "Música cargada.";
                }
            }
        });
    }

    // 2. Función de Mezcla: Baja música, habla, sube música
    function speakText() {
        const text = document.getElementById('tts-text').value;
        if (!text) return;

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9; // Velocidad un poco más natural

        // Atenuar música
        if (player && player.setVolume) player.setVolume(20);

        utterance.onend = () => {
            // Restaurar música
            if (player && player.setVolume) player.setVolume(100);
            document.getElementById('status-bar').innerText = "Esperando siguiente minuto...";
        };

        window.speechSynthesis.speak(utterance);
    }

    // 3. Control del Ciclo de 1 Minuto
    function toggleAutoMode() {
        isAutoOn = !isAutoOn;
        const btn = document.getElementById('btn-auto');

        if (isAutoOn) {
            btn.innerText = "Detener Ciclo";
            btn.style.background = "#8b0000";
            speakText(); // Primera ejecución inmediata
            autoInterval = setInterval(speakText, 60000); // Repetir cada 60 seg
            document.getElementById('status-bar').innerText = "Ciclo activo.";
        } else {
            btn.innerText = "Activar Ciclo Automático";
            btn.style.background = "var(--accent)";
            clearInterval(autoInterval);
            document.getElementById('status-bar').innerText = "Ciclo detenido.";
        }
    }

    // Cargar script de YouTube dinámicamente
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>

</body>
</html>
