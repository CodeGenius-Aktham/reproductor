<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytes Radio - YouTube Selection</title>
    <style>
        :root {
            --yt-black: #0f0f0f;
            --yt-red: #ff0000;
            --yt-grey: #272727;
            --bytes-green: #19510A;
            --text-main: #f1f1f1;
        }

        body {
            background-color: var(--yt-black);
            color: var(--text-main);
            font-family: "Roboto", Arial, sans-serif;
            margin: 0;
            padding-bottom: 120px; /* Espacio para el panel fijo */
        }

        /* Barra de búsqueda superior */
        .nav-bar {
            position: sticky;
            top: 0;
            background: var(--yt-black);
            padding: 15px;
            display: flex;
            justify-content: center;
            z-index: 1000;
            border-bottom: 1px solid var(--yt-grey);
        }

        .search-box {
            display: flex;
            width: 90%;
            max-width: 700px;
        }

        .search-box input {
            flex: 1;
            background: #121212;
            border: 1px solid #333;
            color: white;
            padding: 12px 20px;
            border-radius: 40px 0 0 40px;
            font-size: 16px;
            outline: none;
        }

        .search-box button {
            background: #333;
            border: 1px solid #333;
            color: white;
            padding: 0 25px;
            border-radius: 0 40px 40px 0;
            cursor: pointer;
        }

        /* Cuadrícula de resultados tipo YouTube */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .video-item {
            cursor: pointer;
            transition: 0.2s;
        }

        .video-item:hover { transform: scale(1.02); }

        .thumbnail-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }

        .video-info {
            display: flex;
            margin-top: 12px;
            gap: 12px;
        }

        .video-text h3 {
            font-size: 15px;
            margin: 0;
            line-height: 1.4;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-text p { font-size: 13px; color: #aaa; margin: 4px 0 0 0; }

        /* Panel de Control Inferior (Locutor y Mezcla) */
        .footer-control {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.98);
            border-top: 1px solid var(--yt-grey);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .locutor-input { width: 40%; }
        
        textarea {
            width: 100%;
            background: #121212;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            resize: none;
        }

        .status-circle {
            text-align: center;
            min-width: 80px;
        }

        .timer-num {
            font-size: 24px;
            font-weight: bold;
            color: var(--bytes-green);
        }

        #hidden-player { display: none; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="search-box">
        <input type="text" id="query" placeholder="Busca una canción o artista...">
        <button onclick="searchVideos()">Buscar</button>
    </div>
</div>

<div class="results-grid" id="container">
    <p style="text-align: center; grid-column: 1/-1; color: #888; font-size: 18px; margin-top: 50px;">
        Busca arriba para ver las opciones de YouTube
    </p>
</div>

<div class="footer-control">
    <div id="hidden-player"></div>

    <div class="locutor-input">
        <label style="font-size: 10px; color: var(--bytes-green); font-weight: bold; display: block; margin-bottom: 5px;">GUION DEL LOCUTOR IA</label>
        <textarea id="tts-content" rows="2" placeholder="Escribe el anuncio de cada minuto..."></textarea>
    </div>

    <div class="status-circle">
        <div class="timer-num" id="timer">01:00</div>
        <div style="font-size: 9px; color: #888;">PARA ANUNCIO</div>
    </div>

    <button id="master-btn" onclick="toggleSystem()" style="background: var(--yt-red); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer;">
        INICIAR RADIO
    </button>
</div>

<script>
    let player;
    let isRunning = false;
    let timerInt;
    let ttsInt;
    let timeLeft = 60;

    // Cargar YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('hidden-player', {
            height: '0',
            width: '0',
            playerVars: { 'autoplay': 1, 'controls': 1 },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    // BUSCADOR VISUAL
    async function searchVideos() {
        const q = document.getElementById('query').value;
        if(!q) return;

        const container = document.getElementById('container');
        container.innerHTML = "<p style='text-align: center; grid-column: 1/-1;'>Buscando en el catálogo de YouTube...</p>";

        // Usamos la API para "cuyear" la lista y extraer los datos de los resultados
        player.cuePlaylist({
            listType: 'search',
            list: q
        });

        // Esperar a que la lista se cargue internamente
        setTimeout(() => {
            const list = player.getPlaylist();
            container.innerHTML = "";
            
            if(list && list.length > 0) {
                list.slice(0, 12).forEach((id, index) => {
                    const card = document.createElement('div');
                    card.className = 'video-item';
                    card.onclick = () => selectVideo(id);
                    card.innerHTML = `
                        <div class="thumbnail-container">
                            <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
                        </div>
                        <div class="video-info">
                            <div class="video-text">
                                <h3>Resultado de búsqueda #${index + 1}</h3>
                                <p>Toca para reproducir y empezar radio</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }, 1500);
    }

    function selectVideo(id) {
        player.loadVideoById(id);
        if(!isRunning) toggleSystem();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function toggleSystem() {
        isRunning = !isRunning;
        const btn = document.getElementById('master-btn');
        
        if(isRunning) {
            btn.innerText = "DETENER RADIO";
            btn.style.background = "#333";
            startLogic();
        } else {
            btn.innerText = "INICIAR RADIO";
            btn.style.background = "var(--yt-red)";
            stopLogic();
        }
    }

    function startLogic() {
        clearInterval(timerInt);
        clearInterval(ttsInt);
        timeLeft = 60;

        timerInt = setInterval(() => {
            timeLeft--;
            if(timeLeft < 0) timeLeft = 59;
            const s = timeLeft < 10 ? '0'+timeLeft : timeLeft;
            document.getElementById('timer').innerText = `00:${s}`;
        }, 1000);

        ttsInt = setInterval(runLocutor, 60000);
    }

    function runLocutor() {
        const txt = document.getElementById('tts-content').value;
        if(!txt) return;

        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-MX';
        
        player.setVolume(15);
        msg.onend = () => {
            player.setVolume(100);
            timeLeft = 60;
        };
        window.speechSynthesis.speak(msg);
    }

    function stopLogic() {
        clearInterval(timerInt);
        clearInterval(ttsInt);
        player.stopVideo();
        window.speechSynthesis.cancel();
    }

    function onPlayerStateChange(event) {
        // Algoritmo: Si termina un video, YouTube carga el siguiente sugerido
        if (event.data === YT.PlayerState.ENDED) {
            player.playVideo();
        }
    }
</script>

</body>
</html>
