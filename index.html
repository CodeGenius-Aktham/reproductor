<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytes Radio - Engine Fix</title>
    <style>
        :root { --bg: #0a0a0b; --yt: #FF0000; --bytes: #19510A; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 120px; }
        
        .nav { position: sticky; top: 0; background: rgba(10,10,11,0.9); backdrop-filter: blur(10px); padding: 20px; border-bottom: 1px solid #222; z-index: 100; }
        .search-wrap { display: flex; max-width: 600px; margin: 0 auto; background: #111; border-radius: 40px; border: 1px solid #333; overflow: hidden; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 20px; outline: none; font-size: 16px; }
        .search-btn { background: #222; border: none; color: white; padding: 0 25px; cursor: pointer; transition: 0.3s; }
        .search-btn:hover { background: #333; color: var(--yt); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 30px; max-width: 1300px; margin: 0 auto; }
        .card { background: #161617; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .card:hover { border-color: var(--bytes); transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-body h4 { margin: 0; font-size: 14px; color: #fff; line-height: 1.4; height: 40px; overflow: hidden; }

        .mixer-bar { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--bytes); padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; }
        .tts-config { width: 50%; }
        textarea { width: 100%; background: #111; border: 1px solid #333; color: #aaa; border-radius: 8px; padding: 10px; font-size: 12px; resize: none; outline: none; }
        .timer-val { font-size: 32px; font-weight: 800; color: var(--bytes); font-family: monospace; }
        button#master { background: var(--yt); color: white; border: none; padding: 15px 30px; border-radius: 35px; font-weight: bold; cursor: pointer; }
        #player { display: none; }
    </style>
</head>
<body>

<div class="nav">
    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Buscar música en YouTube...">
        <button class="search-btn" onclick="searchYoutube()">BUSCAR</button>
    </div>
</div>

<div class="grid" id="videoGrid">
    <p style="text-align: center; grid-column: 1/-1; color: #555; margin-top: 50px;">Escribe una canción y presiona Buscar.</p>
</div>

<div class="mixer-bar">
    <div id="player"></div>
    <div class="tts-config">
        <label style="font-size: 10px; color: var(--bytes); font-weight: bold; display: block; margin-bottom: 5px;">LOCUCIÓN AUTOMÁTICA</label>
        <textarea id="ttsMsg" rows="2">Estás escuchando la programación especial de Abel Ghanam. Música 24/7 para programadores.</textarea>
    </div>
    <div class="timer-val" id="clock">01:00</div>
    <button id="master" onclick="toggleSystem()">ENCENDER</button>
</div>

<script>
    let ytPlayer, isRunning = false, t1, t2, timeLeft = 60;

    // Cargar API de YouTube
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '0', width: '0',
            playerVars: { 'autoplay': 1, 'controls': 1 },
            events: { 'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) ytPlayer.playVideo(); } }
        });
    }

    // BUSCADOR USANDO PROXY DE DUCKDUCKGO (No da 404)
    async function searchYoutube() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;

        const grid = document.getElementById('videoGrid');
        grid.innerHTML = "<p style='text-align:center; grid-column:1/-1;'>Consultando base de datos...</p>";

        try {
            // Buscamos a través de un servicio de sugerencias y parsing de video
            const response = await fetch(`https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(query)}`);
            const data = await response.text();
            
            // Como no tenemos API Key, usamos una técnica de "Fallback" 
            // Cargar la búsqueda en el reproductor para forzar la lista
            ytPlayer.cuePlaylist({ listType: 'search', list: query });

            setTimeout(() => {
                const playlist = ytPlayer.getPlaylist();
                if(!playlist) {
                    grid.innerHTML = "<p style='text-align:center; grid-column:1/-1;'>YouTube limitó la búsqueda. Intenta con un nombre de canción más corto.</p>";
                    return;
                }
                grid.innerHTML = "";
                playlist.slice(0, 12).forEach((id, i) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => { ytPlayer.loadVideoById(id); if(!isRunning) toggleSystem(); };
                    card.innerHTML = `
                        <img src="https://i.ytimg.com/vi/${id}/mqdefault.jpg" onerror="this.src='https://via.placeholder.com/300x169/111/fff?text=Video+Ready'">
                        <div class="card-body">
                            <h4>Video Sugerido #${i+1}</h4>
                            <p style="font-size:11px; color:var(--bytes); margin-top:5px;">Click para reproducir</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }, 1500);
        } catch (e) {
            grid.innerHTML = "<p style='color:red; grid-column:1/-1; text-align:center;'>Error de conexión. Intenta de nuevo.</p>";
        }
    }

    function toggleSystem() {
        isRunning = !isRunning;
        const btn = document.getElementById('master');
        if(isRunning) {
            btn.innerText = "APAGAR"; btn.style.background = "#222";
            startMixer();
        } else {
            btn.innerText = "ENCENDER"; btn.style.background = "#FF0000";
            stopMixer();
        }
    }

    function startMixer() {
        clearInterval(t1); clearInterval(t2);
        timeLeft = 60;
        t1 = setInterval(() => {
            timeLeft--;
            if(timeLeft < 0) timeLeft = 59;
            document.getElementById('clock').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        }, 1000);
        t2 = setInterval(doSpeech, 60000);
    }

    function doSpeech() {
        const msg = new SpeechSynthesisUtterance(document.getElementById('ttsMsg').value);
        msg.lang = 'es-MX';
        ytPlayer.setVolume(15); // Ducking
        msg.onend = () => { ytPlayer.setVolume(100); timeLeft = 60; };
        window.speechSynthesis.speak(msg);
    }

    function stopMixer() {
        clearInterval(t1); clearInterval(t2);
        ytPlayer.stopVideo();
        window.speechSynthesis.cancel();
    }
</script>

</body>
</html>
