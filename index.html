<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytes Radio - Open Search</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --yt-red: #FF0000;
            --accent: #19510A;
            --card: #1e1e1e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding-bottom: 120px;
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(15,15,15,0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            z-index: 100;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #333;
        }

        .search-group {
            display: flex;
            width: 90%;
            max-width: 600px;
        }

        input {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            color: white;
            padding: 12px 20px;
            border-radius: 40px 0 0 40px;
            outline: none;
        }

        button.search-btn {
            background: #333;
            border: none;
            color: white;
            padding: 0 25px;
            border-radius: 0 40px 40px 0;
            cursor: pointer;
        }

        /* Resultados */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }

        .video-card:hover { transform: translateY(-5px); background: #252525; }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-card-info { padding: 12px; }
        .video-card-info h4 { margin: 0; font-size: 14px; color: #fff; }

        /* Footer Mixer */
        .mixer-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #121212;
            border-top: 1px solid var(--accent);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            z-index: 200;
        }

        .tts-box { width: 50%; }
        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            resize: none;
        }

        .timer-unit { text-align: center; }
        .timer-val { font-size: 28px; font-weight: bold; color: var(--accent); }

        #player-element { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="search-group">
        <input type="text" id="search-input" placeholder="Buscar música en YouTube...">
        <button class="search-btn" onclick="performSearch()">Buscar</button>
    </div>
</div>

<div class="grid" id="results-grid">
    <p style="text-align: center; grid-column: 1/-1; color: #888;">Busca un artista o género para ver las opciones.</p>
</div>

<div class="mixer-footer">
    <div id="player-element"></div>

    <div class="tts-box">
        <label style="font-size: 10px; color: var(--accent); font-weight: bold;">LOCUTOR ACTIVO (1 MIN)</label>
        <textarea id="tts-content" rows="2">Estás escuchando Bytes Radio. La mejor música seleccionada por IA.</textarea>
    </div>

    <div class="timer-unit">
        <div class="timer-val" id="timer-display">01:00</div>
    </div>

    <button id="power-btn" onclick="toggleRadio()" style="background: var(--yt-red); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer;">
        INICIAR RADIO
    </button>
</div>

<script>
    let player;
    let radioOn = false;
    let tTimer, tInterval;
    let timeLeft = 60;

    // API de YouTube IFrame
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player-element', {
            height: '0', width: '0',
            events: { 'onStateChange': (e) => { if(e.data === 0) player.playVideo(); } }
        });
    }

    // BUSCADOR SIN API KEY (Usando un proxy público de búsqueda)
    async function performSearch() {
        const query = document.getElementById('search-input').value;
        if(!query) return;

        const grid = document.getElementById('results-grid');
        grid.innerHTML = "<p style='text-align: center; grid-column: 1/-1;'>Obteniendo resultados...</p>";

        try {
            // Utilizamos una instancia pública de Invidious para obtener resultados sin API Key
            const response = await fetch(`https://invidious.snopyta.org/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
            const data = await response.json();
            
            grid.innerHTML = "";
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => {
                    player.loadVideoById(item.videoId);
                    if(!radioOn) toggleRadio();
                };
                card.innerHTML = `
                    <img src="https://img.youtube.com/vi/${item.videoId}/mqdefault.jpg">
                    <div class="video-card-info">
                        <h4>${item.title}</h4>
                        <p style="color:#888; font-size:12px; margin-top:5px;">${item.author}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            grid.innerHTML = "<p style='color:red; grid-column:1/-1; text-align:center;'>Error de conexión. Intenta de nuevo.</p>";
        }
    }

    function toggleRadio() {
        radioOn = !radioOn;
        const btn = document.getElementById('power-btn');
        if(radioOn) {
            btn.innerText = "DETENER";
            btn.style.background = "#333";
            startMixer();
        } else {
            btn.innerText = "INICIAR RADIO";
            btn.style.background = "var(--yt-red)";
            stopMixer();
        }
    }

    function startMixer() {
        clearInterval(tTimer); clearInterval(tInterval);
        timeLeft = 60;
        tTimer = setInterval(() => {
            timeLeft--;
            if(timeLeft < 0) timeLeft = 59;
            document.getElementById('timer-display').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        }, 1000);
        tInterval = setInterval(speakNow, 60000);
    }

    function speakNow() {
        const text = document.getElementById('tts-content').value;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'es-MX';
        player.setVolume(15);
        msg.onend = () => { player.setVolume(100); timeLeft = 60; };
        window.speechSynthesis.speak(msg);
    }

    function stopMixer() {
        clearInterval(tTimer); clearInterval(tInterval);
        player.stopVideo();
        window.speechSynthesis.cancel();
    }
</script>

</body>
</html>
