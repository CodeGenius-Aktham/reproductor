<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytes Radio - Stable Search</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --yt-red: #FF0000;
            --accent: #19510A;
            --card: #1e1e1e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding-bottom: 120px;
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(15,15,15,0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            z-index: 100;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #333;
        }

        .search-group {
            display: flex;
            width: 90%;
            max-width: 600px;
        }

        input {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            color: white;
            padding: 12px 20px;
            border-radius: 40px 0 0 40px;
            outline: none;
        }

        button.search-btn {
            background: #333;
            border: none;
            color: white;
            padding: 0 25px;
            border-radius: 0 40px 40px 0;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }

        .video-card:hover { transform: translateY(-5px); background: #252525; }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-card-info { padding: 12px; }
        .video-card-info h4 { margin: 0; font-size: 14px; color: #fff; line-height: 1.4; }

        .mixer-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #121212;
            border-top: 1px solid var(--accent);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            z-index: 200;
        }

        .tts-box { width: 50%; }
        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            resize: none;
        }

        .timer-val { font-size: 28px; font-weight: bold; color: var(--accent); }
        #player-element { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="search-group">
        <input type="text" id="search-input" placeholder="Buscar música (Ej: Artista, género)...">
        <button class="search-btn" onclick="startSearch()">Buscar</button>
    </div>
</div>

<div class="grid" id="results-grid">
    <p style="text-align: center; grid-column: 1/-1; color: #888;">Busca algo para ver los resultados de YouTube.</p>
</div>

<div class="mixer-footer">
    <div id="player-element"></div>
    <div class="tts-box">
        <label style="font-size: 10px; color: var(--accent); font-weight: bold;">LOCUTOR (MENSAJE CADA 1 MIN)</label>
        <textarea id="tts-content" rows="2">Estás escuchando la radio de Abel Ghanam. Disfruta de la mejor música.</textarea>
    </div>
    <div class="timer-val" id="timer-display">01:00</div>
    <button id="power-btn" onclick="toggleRadio()" style="background: var(--yt-red); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer;">
        ENCENDER RADIO
    </button>
</div>

<script>
    let player;
    let radioOn = false;
    let tTimer, tInterval;
    let timeLeft = 60;

    // Cargar YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player-element', {
            height: '0', width: '0',
            events: { 'onStateChange': (e) => { if(e.data === 0) player.playVideo(); } }
        });
    }

    // Buscador mediante IFrame Cue (Usa el algoritmo nativo de búsqueda del reproductor)
    function startSearch() {
        const query = document.getElementById('search-input').value;
        if(!query) return;

        const grid = document.getElementById('results-grid');
        grid.innerHTML = "<p style='text-align: center; grid-column: 1/-1;'>Buscando...</p>";

        // Cargamos la búsqueda directamente en el reproductor invisible
        player.cuePlaylist({
            listType: 'search',
            list: query
        });

        // Extraemos la lista generada por el reproductor
        setTimeout(() => {
            const playlist = player.getPlaylist();
            grid.innerHTML = "";
            
            if (playlist && playlist.length > 0) {
                playlist.forEach((id, index) => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => {
                        player.loadVideoById(id);
                        if(!radioOn) toggleRadio();
                    };
                    card.innerHTML = `
                        <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
                        <div class="video-card-info">
                            <h4>Opción de YouTube #${index + 1}</h4>
                            <p style="color:#888; font-size:11px; margin-top:5px;">Haz clic para iniciar la radio</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } else {
                grid.innerHTML = "<p style='text-align: center; grid-column: 1/-1;'>No se encontraron resultados. Intenta con otro término.</p>";
            }
        }, 1200);
    }

    function toggleRadio() {
        radioOn = !radioOn;
        const btn = document.getElementById('power-btn');
        if(radioOn) {
            btn.innerText = "DETENER";
            btn.style.background = "#333";
            startMixer();
        } else {
            btn.innerText = "INICIAR RADIO";
            btn.style.background = "var(--yt-red)";
            stopMixer();
        }
    }

    function startMixer() {
        clearInterval(tTimer); clearInterval(tInterval);
        timeLeft = 60;
        tTimer = setInterval(() => {
            timeLeft--;
            if(timeLeft < 0) timeLeft = 59;
            document.getElementById('timer-display').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        }, 1000);
        tInterval = setInterval(speakNow, 60000);
    }

    function speakNow() {
        const text = document.getElementById('tts-content').value;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'es-MX';
        player.setVolume(15);
        msg.onend = () => { player.setVolume(100); timeLeft = 60; };
        window.speechSynthesis.speak(msg);
    }

    function stopMixer() {
        clearInterval(tTimer); clearInterval(tInterval);
        player.stopVideo();
        window.speechSynthesis.cancel();
    }
</script>

</body>
</html>
